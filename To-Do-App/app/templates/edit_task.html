{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <div>
        <h1>Edit Task</h1>
        <p class="subtext">Update the details below</p>
    </div>
    <a href="{{ url_for('main.index') }}" class="btn btn-secondary">
        ← Back
    </a>
</div>

<div class="form-card">
    <form method="POST"
          action="{{ url_for('main.edit_task', task_id=task.id) }}">

        <!-- Title -->
        <div class="form-group">
            <label for="title">Task Title *</label>
            <input
                type="text"
                id="title"
                name="title"
                value="{{ form_data.get('title', task.title) }}"
                autofocus
            >
        </div>

        <!-- Description -->
        <div class="form-group">
            <label for="description">
                Description <span class="optional">(optional)</span>
            </label>
            <textarea
                id="description"
                name="description"
                rows="3"
            >{{ form_data.get('description', task.description or '') }}</textarea>
        </div>

        <!-- Priority & Category -->
        <div class="form-row">
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    {% for p in priorities %}
                        <option
                            value="{{ p }}"
                            {% if form_data.get('priority', task.priority) == p %}
                                selected
                            {% endif %}
                        >
                            {{ p | capitalize }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for c in categories %}
                        <option
                            value="{{ c }}"
                            {% if form_data.get('category', task.category) == c %}
                                selected
                            {% endif %}
                        >
                            {{ c }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Due date -->
        <div class="form-group">
            <label for="due_date">
                Due Date <span class="optional">(optional)</span>
            </label>
            <input
                type="date"
                id="due_date"
                name="due_date"
                value="{{ form_data.get('due_date',
                    task.due_date.strftime('%Y-%m-%d') if task.due_date else '') }}"
            >
        </div>

        <!-- Buttons -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                ✓ Save Changes
            </button>
            <a href="{{ url_for('main.index') }}" class="btn btn-secondary">
                Cancel
            </a>

            <!-- Danger zone -->
            <form method="POST"
                  action="{{ url_for('main.delete', task_id=task.id) }}"
                  style="margin-left: auto;"
                  onsubmit="return confirm('Delete this task permanently?')">
                <button type="submit" class="btn btn-danger">
                    🗑️ Delete
                </button>
            </form>
        </div>
    </form>
</div>

{% endblock %}
